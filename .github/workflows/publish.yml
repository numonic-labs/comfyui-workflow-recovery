name: Publish to Comfy Registry

# Publishes the node pack to the ComfyUI Registry when a GitHub Release is
# published. Registry versions are immutable and must be valid semver — bump the
# version in pyproject.toml + __init__.py before tagging a release.
#
# Requires a repository secret named REGISTRY_ACCESS_TOKEN (the Comfy Registry
# *publisher* token — NOT a Comfy account/API key, and NOT stored in the repo).
# See PUBLISH_CHECKLIST.md.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish custom node
        uses: Comfy-Org/publish-node-action@main
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
